name: Update Acronis Agent Docker Image

on:
  schedule:
    - cron: '0 2 * * *'
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Get latest version
        id: latest
        run: |
          chmod +x scripts/get_latest_linux_version.sh
          ./scripts/get_latest_linux_version.sh

      - name: Read current version
        id: current
        run: |
          if [ -f version.txt ]; then
            CURRENT=$(cat version.txt)
          else
            CURRENT=""
          fi
          echo "current=$CURRENT" >> $GITHUB_OUTPUT

      - name: Check if new version
        id: check
        run: |
          if [ "${{ steps.latest.outputs.version }}" != "${{ steps.current.outputs.current }}" ]; then
            echo "new=true" >> $GITHUB_OUTPUT
          else
            echo "new=false" >> $GITHUB_OUTPUT
          fi

      - name: Log in to container registry
        if: steps.check.outputs.new == 'true'
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        if: steps.check.outputs.new == 'true'
        uses: docker/build-push-action@v7
        with:
          context: .
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ steps.latest.outputs.version }}
          build-args: |
            AGENT_VERSION=${{ steps.latest.outputs.version }}
            MIRROR_URL=${{ steps.latest.outputs.mirror }}

      # Этот шаг выполнится ТОЛЬКО если сборка и пуш Docker прошли успешно
      - name: Update version.txt
        if: steps.check.outputs.new == 'true'
        run: |
          echo "${{ steps.latest.outputs.version }}" > version.txt
          git config user.name github-actions
          git config user.email github-actions@github.com
          git add version.txt
          git commit -m "Update Acronis agent version to ${{ steps.latest.outputs.version }}"
          git push
